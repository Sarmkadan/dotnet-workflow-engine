name: Build and Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.cs'
      - '**.csproj'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dotnet-version: ['10.0.x']

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal --logger "console;verbosity=detailed"

    - name: Generate coverage report
      run: dotnet test --configuration Release /p:CollectCoverage=true /p:CoverageFormat=opencover

  code-quality:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Check code format
      run: dotnet format --verify-no-changes --verbosity diagnostic
      continue-on-error: true

    - name: Run code analysis
      run: dotnet build /p:EnforceCodeStyleInBuild=true /p:EnableNETAnalyzers=true
      continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Run security scan
      run: |
        dotnet restore
        dotnet add package Security.CodeAnalysis --prerelease || true
      continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    needs: build

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: sarmkadan/dotnet-workflow-engine:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        docker build -t workflow-engine:test .
        echo "Docker image built successfully"

  release:
    runs-on: ubuntu-latest
    needs: [build, code-quality]

    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[release]')

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Build Release
      run: dotnet build --configuration Release

    - name: Create Release Package
      run: |
        mkdir -p release
        dotnet publish -c Release -o release/publish

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v1.2.0
        release_name: Release v1.2.0
        body: |
          # dotnet-workflow-engine v1.2.0

          ## Changes
          - Comprehensive REST API
          - Prometheus metrics
          - Health checks
          - CLI tools
          - Full documentation

          ## Installation
          See [README.md](../blob/main/README.md) for installation instructions.
        draft: false
        prerelease: false

  publish-nuget:
    runs-on: ubuntu-latest
    needs: release

    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[release]')

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Pack
      run: dotnet pack --configuration Release --no-build

    - name: Publish to NuGet
      run: dotnet nuget push "bin/Release/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
      continue-on-error: true

  notify:
    runs-on: ubuntu-latest
    needs: [build, code-quality]
    if: always()

    steps:
    - name: Build Status
      run: |
        if [ "${{ needs.build.result }}" == "success" ] && [ "${{ needs.code-quality.result }}" == "success" ]; then
          echo "✅ Build and tests passed!"
          exit 0
        else
          echo "❌ Build or tests failed!"
          exit 1
        fi
